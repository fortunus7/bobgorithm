    <script>
      window.onerror = function(msg, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color:red; padding:20px;">ERROR: ' + msg + '<br>' + source + ' ' + lineno + ':' + colno + '<br>' + (error && error.stack ? error.stack : '') + '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; padding:20px;">PROMISE ERROR: ' + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + '</div>';
      });
    </script>
